kind: Deployment
apiVersion: apps/v1
metadata:
  name: payments-deploy
  namespace: e-commerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - name: payments
          image: nginx:latest
          ports:
            - containerPort: 80
          command: ["/bin/sh"]
          args:
          - -c
          - |
            mkdir -p /usr/share/nginx/html
            cat > /usr/share/nginx/html/index.html <<EOF
            <!DOCTYPE html>
            <html>
              <body>
                <h1>Welcome to Payments Service</h1>
                <h2>EnggVille</h2>
              </body>
            </html>
            EOF
            nginx -g 'daemon off;'

---

apiVersion: v1
kind: Service
metadata:
  name: payments-service
  namespace: e-commerce
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /index.html
spec:
  selector:
    app: payments
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP